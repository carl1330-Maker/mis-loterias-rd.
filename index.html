<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotería Dominicana Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');
        body { font-family: 'Poppins', sans-serif; background-color: #f1f5f9; margin: 0; }
        .glass-header { background: linear-gradient(135deg, #0f172a 0%, #1e40af 100%); }
        .lottery-card { transition: all 0.3s ease; border-radius: 2rem; background: white; }
        .ball { background: radial-gradient(circle at 30% 30%, #ffffff 0%, #cbd5e1 100%); }
    </style>
</head>
<body>

    <header class="glass-header text-white p-10 shadow-2xl rounded-b-[3rem] mb-10 text-center">
        <h1 class="text-3xl font-bold mb-2"><i class="fas fa-clover text-yellow-400 mr-2"></i> LOTERÍA DOMINICANA</h1>
        <p id="reloj-digital" class="text-blue-100 font-bold text-xl tracking-wider">Iniciando Reloj...</p>
    </header>

    <main class="container mx-auto px-4 max-w-5xl">
        <div class="bg-amber-50 rounded-3xl p-6 mb-10 text-center border-2 border-dashed border-amber-300">
            <h2 class="text-amber-800 font-bold mb-4">TU TRIPLETA DE HOY</h2>
            <div id="lucky-box" class="flex justify-center gap-4 mb-4">
                <div class="ball w-12 h-12 rounded-full flex items-center justify-center font-bold text-xl text-amber-800">?</div>
                <div class="ball w-12 h-12 rounded-full flex items-center justify-center font-bold text-xl text-amber-800">?</div>
                <div class="ball w-12 h-12 rounded-full flex items-center justify-center font-bold text-xl text-amber-800">?</div>
            </div>
            <button onclick="sorteoRapido()" class="bg-amber-500 text-white px-8 py-2 rounded-full font-bold shadow-lg uppercase text-xs tracking-widest hover:bg-amber-600">Generar</button>
        </div>

        <div id="tablero" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 pb-20">
            </div>
    </main>

    <script>
        // 1. RELOJ DE RD (BLINDADO)
        function moverReloj() {
            const display = document.getElementById('reloj-digital');
            const ahora = new Date().toLocaleString("en-US", {timeZone: "America/Santo_Domingo"});
            const fechaRD = new Date(ahora);
            
            const opciones = { day: '2-digit', month: 'long', year: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true };
            if(display) {
                display.innerText = fechaRD.toLocaleString('es-DO', opciones);
            }
        }
        setInterval(moverReloj, 1000);
        moverReloj();

        // 2. CARGAR RESULTADOS
        async function traerPremios() {
            try {
                const res = await fetch('data.json?v=' + Date.now());
                const data = await res.json();
                const tablero = document.getElementById('tablero');
                
                if(!data.loterias) return;
                tablero.innerHTML = '';

                data.loterias.forEach(l => {
                    const card = `
                        <div class="lottery-card p-6 shadow-md border-t-8 border-blue-600">
                            <h3 class="font-bold text-gray-700 mb-6 text-lg uppercase">${l.nombre}</h3>
                            <div class="flex justify-center gap-2">
                                ${l.numeros.map(n => <div class="ball w-12 h-12 rounded-full flex items-center justify-center font-bold text-xl text-gray-700 shadow-inner">${n}</div>).join('')}
                            </div>
                        </div>`;
                    tablero.innerHTML += card;
                });
            } catch (e) { console.log("Esperando datos..."); }
        }
        traerPremios();
        setInterval(traerPremios, 60000);

        // 3. GENERADOR
        function sorteoRapido() {
            const box = document.getElementById('lucky-box');
            box.innerHTML = '';
            for(let i=0; i<3; i++) {
                const n = Math.floor(Math.random() * 100).toString().padStart(2, '0');
                box.innerHTML += <div class="ball w-12 h-12 rounded-full flex items-center justify-center font-bold text-xl text-amber-800 shadow-md animate-bounce">${n}</div>;
            }
        }
    </script>
</body>
</html>
