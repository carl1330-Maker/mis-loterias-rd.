<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotería Dominicana Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: sans-serif; background-color: #f1f5f9; margin: 0; }
        .glass-header { background: linear-gradient(135deg, #0f172a 0%, #1e40af 100%); color: white; padding: 40px 20px; text-align: center; border-radius: 0 0 40px 40px; }
        .ball { background: white; border-radius: 50%; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.1); font-size: 20px; color: #1e40af; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-top: 8px solid #2563eb; }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>
<body>

    <header class="glass-header">
        <h1 style="font-size: 28px; font-weight: bold; margin-bottom: 10px;">🍀 LOTERÍA DOMINICANA</h1>
        <div id="reloj-rd" style="font-size: 22px; font-weight: bold; color: #fbbf24; min-height: 30px;">Iniciando...</div>
    </header>

    <main class="container mx-auto p-6" style="max-width: 1100px;">
        <div style="background: #fffbeb; padding: 25px; border-radius: 25px; text-align: center; margin-bottom: 40px; border: 2px dashed #fbbf24;">
            <p style="font-weight: bold; color: #92400e; margin-bottom: 15px;">TU TRIPLETA DE LA SUERTE</p>
            <div id="lucky-box" style="display: flex; justify-content: center; gap: 15px; margin-bottom: 20px;">
                <div class="ball">?</div>
                <div class="ball">?</div>
                <div class="ball">?</div>
            </div>
            <button onclick="generarSuerte()" style="background: #fbbf24; color: #92400e; border: none; padding: 12px 30px; border-radius: 50px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 14px; box-shadow: 0 4px 0 #d97706;">Generar Números</button>
        </div>

        <div id="tablero" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <!-- Las tarjetas se cargarán aquí -->
        </div>
    </main>

    <script>
        // 1. RELOJ DE RD (CORREGIDO)
        function actualizarReloj() {
            const visor = document.getElementById('reloj-rd');
            if (!visor) return;
            
            try {
                const ahora = new Date();
                const opciones = {
                    timeZone: "America/Santo_Domingo",
                    hour: '2-digit', 
                    minute: '2-digit', 
                    second: '2-digit', 
                    hour12: true,
                    day: '2-digit', 
                    month: 'long', 
                    year: 'numeric'
                };
                
                // Formatear la fecha manualmente para asegurar la visualización
                const fechaRD = ahora.toLocaleString("es-DO", opciones);
                visor.innerHTML = fechaRD;
            } catch (error) {
                console.error("Error en el reloj:", error);
                visor.innerHTML = new Date().toLocaleString("es-ES");
            }
        }
        
        actualizarReloj();
        setInterval(actualizarReloj, 1000);

        // 2. CARGA DE DATOS (CORREGIDA)
        async function cargarLoterias() {
            const tablero = document.getElementById('tablero');
            
            try {
                // Mostrar indicador de carga
                tablero.innerHTML = `
                    <div class="col-span-full text-center py-10">
                        <p style="color: #64748b; font-weight: 500;">Cargando resultados oficiales...</p>
                    </div>
                `;
                
                // Intentar cargar los datos
                const response = await fetch('./data.json?nocache=' + Date.now());
                
                if (!response.ok) {
                    throw new Error(Error HTTP: ${response.status});
                }
                
                const data = await response.json();
                
                // Verificar que los datos existen
                if (!data || !data.loterias || data.loterias.length === 0) {
                    throw new Error("No hay datos disponibles");
                }

                // Limpiar el tablero
                tablero.innerHTML = '';
                
                // Agregar cada tarjeta usando el método correcto
                data.loterias.forEach(l => {
                    // Crear elemento div para la tarjeta
                    const cardDiv = document.createElement('div');
                    cardDiv.className = 'card';
                    
                    // Construir el contenido HTML de la tarjeta
                    let numerosHTML = '';
                    l.numeros.forEach(n => {
                        numerosHTML += <div class="ball">${n}</div>;
                    });
                    
                    cardDiv.innerHTML = `
                        <h3 style="font-weight: 800; color: #1e293b; margin-bottom: 20px; text-transform: uppercase; font-size: 16px;">${l.nombre}</h3>
                        <div style="display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;">
                            ${numerosHTML}
                        </div>
                        <p style="margin-top: 20px; font-size: 10px; color: #94a3b8; font-weight: bold; letter-spacing: 1px;">
                            OFICIAL • ${new Date().toLocaleTimeString('es-DO', { timeZone: 'America/Santo_Domingo', hour: '2-digit', minute: '2-digit' })}
                        </p>
                    `;
                    
                    // Agregar la tarjeta al tablero
                    tablero.appendChild(cardDiv);
                });
                
            } catch (error) {
                console.error("Error cargando el JSON:", error);
                
                // Mostrar mensaje de error en el tablero
                tablero.innerHTML = `
                    <div class="col-span-full text-center py-10">
                        <p style="color: #ef4444; font-weight: 500;">
                            Error al cargar los datos. Por favor, verifica que el archivo data.json existe.
                        </p>
                        <p style="color: #64748b; font-size: 14px; margin-top: 10px;">
                            Detalles: ${error.message}
                        </p>
                    </div>
                `;
            }
        }
        
        // Cargar inmediatamente y cada minuto
        cargarLoterias();
        setInterval(cargarLoterias, 60000);

        // 3. GENERADOR DE SUERTE (CORREGIDO)
        function generarSuerte() {
            const box = document.getElementById('lucky-box');
            if (!box) return;
            
            // Limpiar el contenedor
            box.innerHTML = '';
            
            // Generar y agregar números
            for(let i = 0; i < 3; i++) {
                const n = Math.floor(Math.random() * 100).toString().padStart(2, '0');
                const ballDiv = document.createElement('div');
                ballDiv.className = 'ball';
                ballDiv.style.background = '#fbbf24';
                ballDiv.style.color = 'white';
                ballDiv.style.border = 'none';
                ballDiv.style.animation = 'bounce 0.5s ease';
                ballDiv.textContent = n;
                box.appendChild(ballDiv);
            }
        }

        // Datos de ejemplo para pruebas (si no existe el archivo data.json)
        // Puedes eliminar esto cuando tengas el archivo real
        window.addEventListener('load', function() {
            // Verificar si hay datos después de 2 segundos
            setTimeout(() => {
                const tablero = document.getElementById('tablero');
                if (tablero.children.length === 1 && tablero.children[0].classList.contains('col-span-full')) {
                    // Si solo hay el mensaje de carga, cargar datos de ejemplo
                    cargarDatosEjemplo();
                }
            }, 2000);
        });

        function cargarDatosEjemplo() {
            const tablero = document.getElementById('tablero');
            tablero.innerHTML = '';
            
            const loteriasEjemplo = [
                { nombre: "LOTERÍA NACIONAL", numeros: ["12", "24", "36"] },
                { nombre: "LOTERÍA REAL", numeros: ["08", "15", "42"] },
                { nombre: "LOTERÍA PRIMERA", numeros: ["03", "17", "31"] }
            ];
            
            loteriasEjemplo.forEach(l => {
                const cardDiv = document.createElement('div');
                cardDiv.className = 'card';
                
                let numerosHTML = '';
                l.numeros.forEach(n => {
                    numerosHTML += <div class="ball">${n}</div>;
                });
                
                cardDiv.innerHTML = `
                    <h3 style="font-weight: 800; color: #1e293b; margin-bottom: 20px; text-transform: uppercase; font-size: 16px;">${l.nombre}</h3>
                    <div style="display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;">
                        ${numerosHTML}
                    </div>
                    <p style="margin-top: 20px; font-size: 10px; color: #94a3b8; font-weight: bold; letter-spacing: 1px;">
                        DATOS DE EJEMPLO • ${new Date().toLocaleTimeString('es-DO', { timeZone: 'America/Santo_Domingo', hour: '2-digit', minute: '2-digit' })}
                    </p>
                `;
                
                tablero.appendChild(cardDiv);
            });
        }
    </script>
</body>
</html>
