<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotería Dominicana Pro | Resultados y Pronósticos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');
        body { font-family: 'Poppins', sans-serif; background-color: #f0f4f8; }
        .glass-header { background: linear-gradient(135deg, #0f172a 0%, #1e40af 100%); }
        .lottery-card { transition: all 0.3s ease; }
        .lottery-card:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(0,0,0,0.1); }
        .ball { background: radial-gradient(circle at 30% 30%, #ffffff 0%, #e2e8f0 100%); border: 1px solid #cbd5e1; }
        .lucky-section { background: linear-gradient(135deg, #fef3c7 0%, #fff7ed 100%); border: 2px dashed #f59e0b; }
    </style>
</head>
<body>

    <header class="glass-header text-white p-8 shadow-2xl rounded-b-[3.5rem] mb-10 text-center">
        <div class="flex justify-center items-center mb-2">
            <i class="fas fa-clover text-4xl text-yellow-400 mr-3"></i>
            <h1 class="text-3xl font-bold tracking-tight">LOTERÍA DOMINICANA</h1>
        </div>
        <p id="fecha" class="text-blue-100 font-medium text-lg">Cargando hora de RD...</p>
    </header>

    <main class="container mx-auto px-4 max-w-6xl">
        <section class="lucky-section rounded-3xl p-6 mb-12 text-center shadow-sm">
            <h2 class="text-amber-800 font-bold text-xl mb-4"><i class="fas fa-magic mr-2"></i> Tu Tripleta de la Suerte</h2>
            <div id="tripleta-container" class="flex justify-center gap-4 mb-4">
                <div class="ball w-14 h-14 rounded-full flex items-center justify-center text-2xl font-bold text-amber-700 shadow-sm">?</div>
                <div class="ball w-14 h-14 rounded-full flex items-center justify-center text-2xl font-bold text-amber-700 shadow-sm">?</div>
                <div class="ball w-14 h-14 rounded-full flex items-center justify-center text-2xl font-bold text-amber-700 shadow-sm">?</div>
            </div>
            <button onclick="generarTripleta()" class="bg-amber-500 hover:bg-amber-600 text-white font-bold py-2 px-6 rounded-full transition shadow-md text-sm uppercase tracking-widest">
                Generar Números
            </button>
        </section>

        <div id="grid-loterias" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 pb-20">
            </div>
    </main>

    <script>
        const configLoterias = {
            "Gana Más": { color: "border-blue-600", icon: "fas fa-star" },
            "Lotería Nacional": { color: "border-indigo-900", icon: "fas fa-flag" },
            "Quiniela Leidsa": { color: "border-orange-500", icon: "fas fa-ticket" },
            "Quiniela Real": { color: "border-red-600", icon: "fas fa-crown" },
            "Quiniela Loteka": { color: "border-purple-600", icon: "fas fa-gem" },
            "La Primera Día": { color: "border-pink-500", icon: "fas fa-sun" },
            "Primera Noche": { color: "border-blue-900", icon: "fas fa-moon" },
            "La Suerte 12:30": { color: "border-green-600", icon: "fas fa-clover" },
            "La Suerte 6:00": { color: "border-green-800", icon: "fas fa-leaf" },
            "New York Tarde": { color: "border-yellow-500", icon: "fas fa-city" }
        };

        async function cargarDatos() {
            try {
                const response = await fetch('data.json?v=' + Date.now());
                const data = await response.json();
                const grid = document.getElementById('grid-loterias');
                grid.innerHTML = '';

                data.loterias.forEach(lot => {
                    const conf = configLoterias[lot.nombre] || { color: "border-gray-300", icon: "fas fa-circle" };
                    const card = `
                        <div class="lottery-card bg-white rounded-[2.5rem] p-7 border-l-[12px] ${conf.color} shadow-sm">
                            <div class="flex justify-between items-center mb-6">
                                <h3 class="font-bold text-gray-800 text-xl">${lot.nombre}</h3>
                                <i class="${conf.icon} ${conf.color.replace('border-', 'text-')} opacity-30 text-xl"></i>
                            </div>
                            <div class="flex justify-center gap-3 mb-6">
                                ${lot.numeros.map(n => <div class="ball w-14 h-14 rounded-full flex items-center justify-center text-2xl font-bold text-gray-700 shadow-inner">${n}</div>).join('')}
                            </div>
                            <div class="text-[10px] text-gray-400 font-bold uppercase tracking-widest text-center border-t pt-4">Oficial • Sincronizado</div>
                        </div>`;
                    grid.innerHTML += card;
                });
            } catch (e) { console.error(e); }
        }

        function generarTripleta() {
            const container = document.getElementById('tripleta-container');
            container.innerHTML = '';
            for(let i=0; i<3; i++) {
                const num = Math.floor(Math.random() * 100).toString().padStart(2, '0');
                container.innerHTML += <div class="ball w-14 h-14 rounded-full flex items-center justify-center text-2xl font-bold text-amber-700 shadow-md animate-bounce">${num}</div>;
            }
        }

        function actualizarReloj() {
            const opciones = { timeZone: 'America/Santo_Domingo', day: '2-digit', month: 'long', year: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true };
            document.getElementById('fecha').textContent = new Date().toLocaleString('es-DO', opciones);
        }

        document.addEventListener("DOMContentLoaded", () => {
            actualizarReloj();
            cargarDatos();
            setInterval(actualizarReloj, 1000);
            setInterval(cargarDatos, 60000);
        });
    </script>
</body>
</html>
