<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotería Dominicana Hoy | Resultados en Tiempo Real</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Colores Oficiales */
        .card-nacional { border-top-color: #003876; } /* Azul Marino */
        .card-leidsa { border-top-color: #FF6600; }   /* Naranja */
        .card-lotereal { border-top-color: #0056b3; } /* Azul Real */
        .card-loteka { border-top-color: #e30613; }   /* Rojo */
        .card-ny { border-top-color: #000000; }       /* Negro/Oro */
        
        .ball {
            background: radial-gradient(circle at 30% 30%, #ffffff 0%, #e5e7eb 100%);
            box-shadow: inset -2px -2px 5px rgba(0,0,0,0.2), 2px 5px 10px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body class="bg-gray-50 font-sans min-h-screen">

    <nav class="bg-white shadow-sm border-b border-gray-200 p-4 sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="bg-blue-800 p-2 rounded-lg text-white font-black text-xl">RD</div>
                <h1 class="text-xl font-bold text-gray-800 tracking-tight">Lotería <span class="text-blue-800">Dominicana</span></h1>
            </div>
            <div id="status" class="flex items-center gap-2 text-xs font-medium text-green-600 bg-green-50 px-3 py-1 rounded-full">
                <span class="relative flex h-2 w-2">
                  <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                  <span class="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span>
                </span>
                Sincronizado
            </div>
        </div>
    </nav>

    <header class="bg-blue-800 py-10 text-white text-center mb-10">
        <h2 class="text-3xl font-extrabold mb-2">Resultados de Hoy</h2>
        <p class="text-blue-200" id="fecha-actual">Cargando fecha...</p>
    </header>

    <main class="container mx-auto px-4 pb-20">
        <div id="grid-loterias" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
            </div>
    </main>

    <footer class="bg-white border-t border-gray-200 py-8 text-center mt-auto">
        <p class="text-gray-500 text-sm italic">Este sitio es de carácter informativo. Los resultados oficiales deben verificarse en los puntos de venta autorizados.</p>
        <p class="text-gray-400 text-xs mt-2">© 2026 RD-Lotto Automation</p>
    </footer>

    <script>
        const configLoterias = {
            "Gana Más": { class: "card-nacional", logo: "https://upload.wikimedia.org/wikipedia/commons/4/4c/Loteria_Nacional_RD.png" },
            "Lotería Nacional": { class: "card-nacional", logo: "https://upload.wikimedia.org/wikipedia/commons/4/4c/Loteria_Nacional_RD.png" },
            "LEIDSA": { class: "card-leidsa", logo: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRz-..." },
            "Loto Real": { class: "card-lotereal", logo: "https://lotoreal.com.do/favicon.ico" },
            "Loteka": { class: "card-loteka", logo: "https://loteka.com.do/favicon.ico" },
            "New York Tarde": { class: "card-ny", logo: "https://upload.wikimedia.org/wikipedia/en/thumb/5/52/New_York_Lottery_logo.svg/1200px-New_York_Lottery_logo.svg.png" }
        };

        async function cargarDatos() {
            try {
                const res = await fetch('data.json?t=' + Date.now());
                const data = await res.json();
                
                document.getElementById('fecha-actual').innerText = data.actualizado;
                const grid = document.getElementById('grid-loterias');
                grid.innerHTML = '';

                data.loterias.forEach(lot => {
                    const conf = configLoterias[lot.nombre] || { class: "border-gray-300", logo: "" };
                    
                    const card = `
                        <div class="bg-white rounded-2xl shadow-md border-t-8 ${conf.class} p-6 hover:shadow-xl transition-all">
                            <div class="flex flex-col items-center mb-6">
                                <span class="text-xs uppercase font-bold text-gray-400 tracking-widest mb-2">Sorteo</span>
                                <h3 class="text-lg font-black text-gray-800 text-center">${lot.nombre}</h3>
                            </div>
                            
                            <div class="flex justify-center gap-3 mb-6">
                                ${lot.numeros.map(n => `
                                    <div class="ball w-14 h-14 rounded-full flex items-center justify-center text-2xl font-black text-blue-900 border border-gray-200">
                                        ${n}
                                    </div>
                                `).join('')}
                            </div>
                            
                            <div class="flex justify-between items-center text-[10px] text-gray-400 border-t pt-4">
                                <span><i class="fa-solid fa-check-double text-green-500"></i> Verificado</span>
                                <span>OFICIAL</span>
                            </div>
                        </div>
                    `;
                    grid.innerHTML += card;
                });
            } catch (e) {
                console.error("Error:", e);
            }
        }
 function actualizarFechaRD() {
    const opciones = { 
        timeZone: 'America/Santo_Domingo', 
        year: 'numeric', 
        month: '2-digit', 
        day: '2-digit', 
        hour: '2-digit', 
        minute: '2-digit', 
        second: '2-digit',
        hour12: true 
    };
    const fechaRD = new Date().toLocaleString('es-DO', opciones);
    const elementoFecha = document.querySelector('p.text-blue-100') || document.getElementById('fecha');
    if (elementoFecha) {
        elementoFecha.textContent = fechaRD;
    }
}

// Ejecutarlo de una vez
actualizarFechaRD();
        cargarDatos();
        // Recarga cada 5 minutos sin refrescar página
        setInterval(cargarDatos, 300000);
    </script>
</body>
</html>
