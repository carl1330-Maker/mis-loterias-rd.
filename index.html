<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotería Dominicana</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f1f5f9; }
        .ball {
            background: white;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 20px;
            color: #1e40af;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body class="p-4">

    <div class="bg-blue-900 text-white p-8 rounded-b-3xl text-center mb-6">
        <h1 class="text-3xl font-bold mb-2">🍀 LOTERÍA DOMINICANA</h1>
        <div id="reloj" class="text-2xl text-yellow-300">Cargando...</div>
    </div>

    <!-- Generador de números -->
    <div class="bg-yellow-50 p-6 rounded-2xl border-2 border-dashed border-yellow-400 mb-6 text-center">
        <p class="font-bold text-yellow-800 mb-3">TU TRIPLETA DE LA SUERTE</p>
        <div id="numeros-suerte" class="flex justify-center gap-3 mb-4">
            <div class="ball">?</div>
            <div class="ball">?</div>
            <div class="ball">?</div>
        </div>
        <button onclick="generarSuerte()" class="bg-yellow-400 text-yellow-800 px-8 py-3 rounded-full font-bold hover:bg-yellow-500">
            GENERAR NÚMEROS
        </button>
    </div>

    <!-- Resultados de loterías -->
    <div id="resultados" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
        <!-- Se llenará con JavaScript -->
    </div>

    <script>
        // 1. RELOJ SIMPLE
        function actualizarReloj() {
            const reloj = document.getElementById('reloj');
            if (!reloj) return;
            
            const ahora = new Date();
            const opciones = {
                timeZone: 'America/Santo_Domingo',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                day: '2-digit',
                month: 'long'
            };
            
            reloj.textContent = ahora.toLocaleString('es-DO', opciones);
        }
        
        actualizarReloj();
        setInterval(actualizarReloj, 1000);

        // 2. DATOS DE LOTERÍAS
        const loterias = [
            { nombre: 'LOTERÍA NACIONAL', numeros: ['12', '24', '36'] },
            { nombre: 'LOTERÍA REAL', numeros: ['08', '15', '42'] },
            { nombre: 'LOTERÍA PRIMERA', numeros: ['03', '17', '31'] },
            { nombre: 'LOTERÍA EXTRA', numeros: ['05', '19', '28'] },
            { nombre: 'LOTERÍA NOCHE', numeros: ['11', '22', '33'] },
            { nombre: 'LOTERÍA FIN DE SEMANA', numeros: ['07', '14', '21'] }
        ];

        // 3. MOSTRAR LOTERÍAS
        function mostrarLoterias() {
            const contenedor = document.getElementById('resultados');
            if (!contenedor) return;
            
            let html = '';
            
            loterias.forEach(l => {
                html += `
                    <div class="bg-white p-5 rounded-xl shadow-md border-t-4 border-blue-600">
                        <h3 class="font-bold text-gray-800 mb-3 text-center">${l.nombre}</h3>
                        <div class="flex justify-center gap-2">
                `;
                
                l.numeros.forEach(n => {
                    html += <div class="ball">${n}</div>;
                });
                
                html += `
                        </div>
                        <p class="text-xs text-gray-400 text-center mt-3">OFICIAL</p>
                    </div>
                `;
            });
            
            contenedor.innerHTML = html;
        }

        // 4. GENERAR NÚMEROS DE SUERTE
        function generarSuerte() {
            const contenedor = document.getElementById('numeros-suerte');
            if (!contenedor) return;
            
            let numeros = '';
            for (let i = 0; i < 3; i++) {
                const num = Math.floor(Math.random() * 100).toString().padStart(2, '0');
                numeros += <div class="ball" style="background:#fbbf24; color:#92400e;">${num}</div>;
            }
            
            contenedor.innerHTML = numeros;
        }

        // 5. INICIAR TODO
        window.onload = function() {
            mostrarLoterias();
        };
    </script>

</body>
</html>
