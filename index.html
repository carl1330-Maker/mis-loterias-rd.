<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotería Dominicana</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            font-family: Arial, sans-serif;
            padding: 16px;
        }
        
        .ball {
            background: white;
            border-radius: 50%;
            width: 55px;
            height: 55px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 24px;
            color: #1e3c72;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            margin: 0 5px;
            transition: all 0.3s;
        }
        
        .ball:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 12px rgba(0,0,0,0.4);
        }
        
        .card-loteria {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            border-top: 6px solid #3b82f6;
            transition: all 0.3s;
        }
        
        .btn-generar {
            background: linear-gradient(135deg, #f59e0b, #fbbf24);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 4px 0 #b45309;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .btn-generar:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #b45309;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        .bounce {
            animation: bounce 0.5s ease;
        }
        
        #reloj {
            font-family: 'Courier New', monospace;
            font-size: 24px;
            background: rgba(0,0,0,0.3);
            padding: 10px 20px;
            border-radius: 50px;
            display: inline-block;
        }
    </style>
</head>
<body>

    <div class="max-w-7xl mx-auto">
        
        <!-- HEADER CON RELOJ - VERSIÓN CORREGIDA -->
        <div class="bg-gradient-to-r from-blue-900 to-indigo-900 text-white p-8 rounded-3xl shadow-2xl mb-6 text-center">
            <h1 class="text-4xl font-bold mb-4">🍀 LOTERÍA DOMINICANA</h1>
            <div id="reloj" class="text-yellow-300 font-bold">
                Cargando hora...
            </div>
            <div id="fecha" class="text-white text-lg mt-2 opacity-80">
                <!-- Fecha separada -->
            </div>
        </div>

        <!-- GENERADOR DE SUERTE -->
        <div class="bg-gradient-to-r from-amber-100 to-yellow-100 p-8 rounded-3xl shadow-lg mb-8 text-center border-2 border-amber-400">
            <p class="font-bold text-amber-800 text-2xl mb-4">🎲 TU TRIPLETA DE LA SUERTE</p>
            
            <div id="numeros-suerte" class="flex justify-center gap-4 mb-6 flex-wrap">
                <div class="ball">?</div>
                <div class="ball">?</div>
                <div class="ball">?</div>
            </div>
            
            <button onclick="generarSuerte()" class="btn-generar text-lg px-10 py-4">
                ✨ GENERAR NÚMEROS ✨
            </button>
        </div>

        <!-- TÍTULO RESULTADOS -->
        <h2 class="text-white text-2xl font-bold mb-4 flex items-center">
            <span class="bg-yellow-400 text-blue-900 px-4 py-2 rounded-full mr-2">📊</span> 
            RESULTADOS OFICIALES
        </h2>
        
        <!-- GRID DE LOTERÍAS -->
        <div id="resultados" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">
            <!-- Las tarjetas se generarán aquí -->
        </div>
        
        <!-- FOOTER -->
        <footer class="text-center text-white mt-8 opacity-75 text-sm">
            <p>© 2024 Lotería Dominicana • Resultados actualizados cada minuto</p>
        </footer>
    </div>

    <script>
        // ========== 1. RELOJ DE REPÚBLICA DOMINICANA - CORREGIDO ==========
        function actualizarReloj() {
            const reloj = document.getElementById('reloj');
            const fechaEl = document.getElementById('fecha');
            
            if (!reloj) return;
            
            try {
                const ahora = new Date();
                
                // Opciones para la hora (solo hora, minutos, segundos)
                const opcionesHora = {
                    timeZone: 'America/Santo_Domingo',
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit',
                    hour12: true
                };
                
                // Opciones para la fecha
                const opcionesFecha = {
                    timeZone: 'America/Santo_Domingo',
                    weekday: 'long',
                    year: 'numeric',
                    month: 'long',
                    day: 'numeric'
                };
                
                // Formatear hora y fecha por separado
                const horaFormateada = ahora.toLocaleTimeString('es-DO', opcionesHora);
                const fechaFormateada = ahora.toLocaleDateString('es-DO', opcionesFecha);
                
                // Actualizar elementos
                reloj.textContent = 🕐 ${horaFormateada};
                if (fechaEl) {
                    fechaEl.textContent = 📅 ${fechaFormateada};
                }
                
                console.log("Hora actualizada:", horaFormateada); // Para debug
                
            } catch (error) {
                console.error("Error en reloj:", error);
                // Fallback simple
                const ahora = new Date();
                reloj.textContent = 🕐 ${ahora.toLocaleTimeString()};
                if (fechaEl) {
                    fechaEl.textContent = 📅 ${ahora.toLocaleDateString()};
                }
            }
        }
        
        // Actualizar cada segundo
        actualizarReloj();
        setInterval(actualizarReloj, 1000);

        // ========== 2. DATOS DE LOTERÍAS ==========
        const loterias = [
            { nombre: '🏆 LOTERÍA NACIONAL', numeros: ['12', '24', '36'], color: 'border-blue-500' },
            { nombre: '👑 LOTERÍA REAL', numeros: ['08', '15', '42'], color: 'border-purple-500' },
            { nombre: '⭐ LOTERÍA PRIMERA', numeros: ['03', '17', '31'], color: 'border-pink-500' },
            { nombre: '🎯 LOTERÍA EXTRA', numeros: ['05', '19', '28'], color: 'border-orange-500' },
            { nombre: '🌙 LOTERÍA NOCHE', numeros: ['11', '22', '33'], color: 'border-indigo-500' },
            { nombre: '🎪 LOTERÍA FIN DE SEMANA', numeros: ['07', '14', '21'], color: 'border-green-500' }
        ];

        // ========== 3. FUNCIÓN PARA MOSTRAR LOTERÍAS ==========
        function mostrarLoterias() {
            const contenedor = document.getElementById('resultados');
            if (!contenedor) return;
            
            let html = '';
            
            // Obtener hora actual para mostrar en tarjetas
            const ahora = new Date();
            const opcionesHora = {
                timeZone: 'America/Santo_Domingo',
                hour: '2-digit',
                minute: '2-digit'
            };
            const horaActual = ahora.toLocaleTimeString('es-DO', opcionesHora);
            
            loterias.forEach(l => {
                html += <div class="card-loteria border-t-8 ${l.color}">;
                html += <h3 class="font-bold text-gray-800 text-lg mb-4 text-center">${l.nombre}</h3>;
                html += <div class="flex justify-center gap-3 flex-wrap">;
                
                l.numeros.forEach(n => {
                    html += <div class="ball">${n}</div>;
                });
                
                html += </div>;
                html += <p class="text-xs text-gray-400 text-center mt-4">🕐 ${horaActual} • OFICIAL</p>;
                html += </div>;
            });
            
            contenedor.innerHTML = html;
        }

        // ========== 4. GENERADOR DE NÚMEROS DE LA SUERTE ==========
        function generarSuerte() {
            console.log("Generando números de la suerte...");
            
            const contenedor = document.getElementById('numeros-suerte');
            if (!contenedor) {
                console.error("No se encontró el contenedor");
                return;
            }
            
            let numeros = '';
            for (let i = 0; i < 3; i++) {
                const num = Math.floor(Math.random() * 100).toString().padStart(2, '0');
                
                // Colores diferentes para cada bola
                const colores = [
                    'background: linear-gradient(135deg, #f59e0b, #fbbf24); color: white;',
                    'background: linear-gradient(135deg, #ef4444, #f87171); color: white;',
                    'background: linear-gradient(135deg, #8b5cf6, #a78bfa); color: white;'
                ];
                
                numeros += <div class="ball bounce" style="${colores[i]}">${num}</div>;
            }
            
            contenedor.innerHTML = numeros;
        }

        // ========== 5. ACTUALIZAR HORAS EN TARJETAS ==========
        function actualizarHorasTarjetas() {
            const ahora = new Date();
            const opcionesHora = {
                timeZone: 'America/Santo_Domingo',
                hour: '2-digit',
                minute: '2-digit'
            };
            const horaActual = ahora.toLocaleTimeString('es-DO', opcionesHora);
            
            document.querySelectorAll('.card-loteria p').forEach(p => {
                p.innerHTML = 🕐 ${horaActual} • OFICIAL;
            });
        }

        // ========== 6. INICIALIZAR TODO ==========
        window.addEventListener('DOMContentLoaded', function() {
            console.log("Página cargada, mostrando loterías...");
            mostrarLoterias();
            
            // Actualizar hora cada minuto
            setInterval(actualizarHorasTarjetas, 60000);
            
            // Rotar números cada 30 segundos
            setInterval(() => {
                loterias.forEach(l => {
                    l.numeros = l.numeros.map(() => 
                        Math.floor(Math.random() * 100).toString().padStart(2, '0')
                    );
                });
                mostrarLoterias();
            }, 30000);
        });

        console.log('🍀 Lotería Dominicana iniciada correctamente');
    </script>
</body>
</html>
