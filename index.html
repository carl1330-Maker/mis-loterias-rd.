<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotería Dominicana Pro | Resultados</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');
        body { font-family: 'Poppins', sans-serif; background-color: #f8fafc; }
        .glass-header { background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%); }
        .lottery-card { transition: all 0.3s ease; border: none; }
        .lottery-card:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .ball { 
            background: radial-gradient(circle at 30% 30%, #ffffff 0%, #f1f5f9 100%);
            box-shadow: inset -2px -2px 5px rgba(0,0,0,0.05), 2px 4px 8px rgba(0,0,0,0.1);
        }
        .pulse-live { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <header class="glass-header text-white p-8 shadow-xl rounded-b-[3rem] mb-10">
        <div class="container mx-auto text-center">
            <div class="flex justify-center items-center mb-3">
                <i class="fas fa-clover text-4xl text-yellow-400 mr-3"></i>
                <h1 class="text-3xl font-bold tracking-tight">LOTERÍA DOMINICANA</h1>
            </div>
            <p id="fecha" class="text-blue-100 font-medium text-lg min-h-[28px]">Cargando hora de RD...</p>
            <div class="mt-4 inline-flex items-center bg-blue-900/40 px-5 py-1.5 rounded-full text-[10px] uppercase tracking-[0.2em]">
                <span class="flex h-2 w-2 rounded-full bg-green-400 mr-2 pulse-live"></span> Actualización Automática
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 pb-16">
        <div id="grid-loterias" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <div class="col-span-full text-center py-20">
                <i class="fas fa-circle-notch fa-spin text-4xl text-blue-600 mb-4"></i>
                <p class="text-gray-500">Sincronizando con los sorteos...</p>
            </div>
        </div>
    </main>

    <footer class="text-center py-10 text-gray-400 text-xs border-t border-gray-100">
        <p class="font-bold text-gray-500 mb-1">© 2026 RD-Lotto Automation</p>
        <p>Puerto Plata, República Dominicana</p>
        <p class="mt-3 text-[9px] uppercase tracking-widest opacity-60 px-6">Los resultados son informativos. Verifique siempre con su banquero oficial.</p>
    </footer>

    <script>
        // Configuración de colores e iconos
        const configLoterias = {
            "Gana Más": { color: "border-blue-600", icon: "fas fa-star text-blue-600" },
            "Lotería Nacional": { color: "border-indigo-900", icon: "fas fa-flag text-indigo-900" },
            "Leidsa": { color: "border-orange-500", icon: "fas fa-ticket text-orange-500" },
            "Loto Real": { color: "border-red-600", icon: "fas fa-crown text-red-600" },
            "Loteka": { color: "border-purple-600", icon: "fas fa-gem text-purple-600" },
            "New York Tarde": { color: "border-yellow-500", icon: "fas fa-sun text-yellow-500" },
            "New York Noche": { color: "border-blue-900", icon: "fas fa-moon text-blue-900" }
        };

        async function cargarDatos() {
            const grid = document.getElementById('grid-loterias');
            try {
                // El timestamp (?v=) obliga a GitHub a dar los datos más recientes
                const response = await fetch('data.json?v=' + Date.now());
                if (!response.ok) throw new Error("Error al leer datos");
                
                const data = await response.json();
                
                if (data.loterias && data.loterias.length > 0) {
                    grid.innerHTML = ''; // Limpiamos el cargando
                    
                    data.loterias.forEach(lot => {
                        const conf = configLoterias[lot.nombre] || { color: "border-gray-300", icon: "fas fa-clover text-gray-400" };
                        
                        const card = `
                            <div class="lottery-card bg-white rounded-[2rem] p-7 border-l-[10px] ${conf.color} shadow-sm relative overflow-hidden">
                                <div class="flex justify-between items-center mb-8">
                                    <h3 class="font-bold text-gray-800 text-xl">${lot.nombre}</h3>
                                    <i class="${conf.icon} text-2xl opacity-40"></i>
                                </div>
                                <div class="flex justify-center gap-3 mb-8">
                                    ${lot.numeros.map(n => `
                                        <div class="ball w-14 h-14 rounded-full flex items-center justify-center text-2xl font-bold text-gray-700 border border-gray-100 shadow-md">
                                            ${n}
                                        </div>
                                    `).join('')}
                                </div>
                                <div class="flex justify-between items-center text-[10px] text-gray-400 font-bold uppercase tracking-widest border-t pt-5">
                                    <span class="flex items-center"><i class="fas fa-check-double text-green-500 mr-1.5"></i> Verificado</span>
                                    <span>${new Date().toLocaleDateString()}</span>
                                </div>
                            </div>
                        `;
                        grid.innerHTML += card;
                    });
                }
            } catch (e) {
                console.error("Error cargando el JSON:", e);
                // Si falla, mostramos un mensaje pero no borramos lo que haya
            }
        }

        function actualizarReloj() {
            const opciones = { 
                timeZone: 'America/Santo_Domingo', 
                day: '2-digit', month: 'long', year: 'numeric',
                hour: '2-digit', minute: '2-digit', second: '2-digit', 
                hour12: true 
            };
            const visor = document.getElementById('fecha');
            if (visor) {
                visor.textContent = new Date().toLocaleString('es-DO', opciones);
            }
        }

        // Ejecución inicial
        document.addEventListener("DOMContentLoaded", () => {
            actualizarReloj();
            cargarDatos();
            
            // Reloj cada segundo
            setInterval(actualizarReloj, 1000);
            // Datos cada 60 segundos
            setInterval(cargarDatos, 60000);
        });
    </script>
</body>
</html>
