<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotería Dominicana Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: sans-serif; background-color: #f1f5f9; margin: 0; }
        .glass-header { background: linear-gradient(135deg, #0f172a 0%, #1e40af 100%); color: white; padding: 40px 20px; text-align: center; border-radius: 0 0 40px 40px; }
        .ball { background: white; border-radius: 50%; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-top: 8px solid #2563eb; }
    </style>
</head>
<body>

    <header class="glass-header">
        <h1 style="font-size: 24px; margin-bottom: 10px;">LOTERÍA DOMINICANA</h1>
        <div id="reloj-rd" style="font-size: 20px; font-weight: bold; color: #fbbf24;">Cargando...</div>
    </header>

    <main class="container mx-auto p-4" style="max-width: 1000px;">
        <div style="background: #fffbeb; padding: 20px; border-radius: 20px; text-align: center; margin-bottom: 30px; border: 2px dashed #fbbf24;">
            <p style="font-weight: bold; color: #92400e;">TRIPLETA DE LA SUERTE</p>
            <div id="lucky-box" style="display: flex; justify-content: center; gap: 10px; margin: 15px 0;">
                <div class="ball">?</div><div class="ball">?</div><div class="ball">?</div>
            </div>
            <button onclick="generarNum()" style="background: #fbbf24; border: none; padding: 10px 20px; border-radius: 20px; font-weight: bold; cursor: pointer;">Generar</button>
        </div>

        <div id="tablero" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            </div>
    </main>

    <script>
        // 1. RELOJ (PRUEBA DE FUEGO)
        function actualizarReloj() {
            const el = document.getElementById('reloj-rd');
            const fecha = new Date().toLocaleString("es-DO", {
                timeZone: "America/Santo_Domingo",
                hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true,
                day: '2-digit', month: 'long', year: 'numeric'
            });
            if(el) el.innerHTML = fecha;
        }
        setInterval(actualizarReloj, 1000);
        actualizarReloj();

        // 2. DATOS
        async function cargar() {
            try {
                const r = await fetch('data.json?v=' + Date.now());
                const d = await r.json();
                const t = document.getElementById('tablero');
                if(!d.loterias) return;
                t.innerHTML = '';
                d.loterias.forEach(l => {
                    t.innerHTML += `
                        <div class="card">
                            <p style="font-weight: bold; color: #334155; margin-bottom: 15px; text-transform: uppercase;">${l.nombre}</p>
                            <div style="display: flex; gap: 10px; justify-content: center;">
                                ${l.numeros.map(n => <div class="ball">${n}</div>).join('')}
                            </div>
                        </div>`;
                });
            } catch(e) { console.log("Error de datos"); }
        }
        cargar();

        // 3. SUERTE
        function generarNum() {
            const b = document.getElementById('lucky-box');
            b.innerHTML = '';
            for(let i=0; i<3; i++) {
                const n = Math.floor(Math.random()*100).toString().padStart(2,'0');
                b.innerHTML += <div class="ball" style="background:#fbbf24; color:white;">${n}</div>;
            }
        }
    </script>
</body>
</html>
