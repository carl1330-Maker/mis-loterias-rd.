name: Actualizar Lotería Diaria
on:
  schedule:
    - cron: '*/15 * * * *' # Se ejecuta cada 15 min
  workflow_dispatch: # Permite ejecutarlo manualmente

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Configurar Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.9'
      - name: Instalar dependencias
        run: pip install requests beautifulsoup4
      - name: Ejecutar Scraper
        run: python scraper.py
      - name: Guardar cambios
        run: |
          git config --global user.name 'LotteryBot'
          git config --global user.email 'bot@loteriasrd.com'
          git add data.json
          git commit -m "Actualización automática de números" || exit 0
          git push
